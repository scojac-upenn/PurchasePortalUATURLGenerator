<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Course Picker → Copyable URL</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    .hint {
      color: #555;
      margin: 0 0 16px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 0 0 16px;
    }
    .tab-btn {
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .tab-btn:hover {
      background: #f5f5f5;
    }
    .tab-btn.active {
      background: #eef6ff;
      border-color: #99c2ff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 980px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f7f7f7;
    }
    tbody tr {
      cursor: pointer;
    }
    tbody tr:hover {
      background: #fafafa;
    }
    tbody tr.selected {
      background: #eef6ff;
    }

    .urlbox {
      max-width: 980px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    input[type="text"] {
      flex: 1;
      min-width: 300px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #f5f5f5;
    }
    .status {
      color: #2a6;
      margin-left: 6px;
      min-height: 1em;
    }
    .small {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
    code {
      background: #f5f5f5;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .col-sel { width: 52px; }
    .col-id { width: 140px; }
  </style>
</head>
<body>
  <h1>Purchase Portal UAT Course URL Generator</h1>
  <p class="hint">
    Choose a tab, then click a row below to generate a test URL for that course.
    The URL can be copied/pasted into a new browser tab.
  </p>

  <div class="tabs" role="tablist" aria-label="Course version tabs">
    <button id="basicTab" class="tab-btn active" type="button" role="tab" aria-selected="true">Standard</button>
    <button id="guildTab" class="tab-btn" type="button" role="tab" aria-selected="false">Guild</button>
  </div>

  <div class="urlbox">
    <div class="row">
      <label for="urlOut" style="min-width: 44px;">URL</label>
      <input id="urlOut" type="text" readonly value="" />
      <button id="copyBtn" type="button">Copy</button>
      <span id="status" class="status" aria-live="polite"></span>
    </div>
    <div class="small">
      Base URL: <code id="baseUrlLabel"></code>
    </div>
  </div>

  <br><br>

  <table id="courseTable" aria-label="Course table">
    <thead>
      <tr>
        <th class="col-sel">Sel</th>
        <th class="col-id">Course ID</th>
        <th>Name</th>
      </tr>
    </thead>
    <tbody id="courseTableBody"></tbody>
  </table>

  <script>
    const BASE_URL = "https://wharton-enterprise--uat.sandbox.my.site.com/online/s/course?courseId=";

    const courses = [
      { id: "AIBS", name: "AI for Business" },
      { id: "RBSC", name: "Removing Barriers to Change in Organizations" },
      { id: "MGSC", name: "Managing in the Global Digital Economy" },
      { id: "MTSC", name: "Wharton Emerging Leaders Certificate - Engaging & Motivating Talent" },
      { id: "AASC", name: "Asset Allocation" },
      { id: "ICSK", name: "Improving Communication Skills" },
      { id: "SMSC", name: "Strategic Management: Competitive & Corporate Strategy" },
      { id: "MTSC", name: "Managing and Motivating Talent" },
      { id: "LCSC", name: "Leadership in the 21st Century" },
      { id: "MFSC", name: "Managing the Global Firm" },
      { id: "FTRI", name: "Financial Technologies and Regulatory Implications" },
      { id: "FPSC", name: "Fundamentals of Portfolio Management" },
      { id: "AASC", name: "Asset Allocation" },
      { id: "INVP", name: "Investment Products" },
      { id: "FUTR", name: "Leading an AI Powered Future" },
      { id: "EINN", name: "Introduction to Innovation: Everyone is an Innovator" },
      { id: "INTO", name: "Innovation Tournaments and the Process View" },
      { id: "DETK", name: "Design Thinking: Developing the Solution Concept" },
      { id: "ISDT", name: "Innovation Strategy and Design Thinking Certificate" },
      { id: "MASC", name: "Marketing Analytics: Data Tools and Techniques" },
      { id: "SISC", name: "Selling Ideas: How to Influence Others, and Get Your Message to Catch On" },
      { id: "FDMS", name: "Fundamentals of Digital Marketing, Social Media, and E-Commerce" },
      { id: "BSCA", name: "Business Strategy from Wharton: Competitive Advantage" },
      { id: "MVCR", name: "Managing the Value of Customer Relationships" },
      { id: "LASC", name: "Leadership in the Age of Digital Disruption" },
      { id: "AASC", name: "Asset Allocation" }
    ];

    const urlOut = document.getElementById("urlOut");
    const copyBtn = document.getElementById("copyBtn");
    const statusEl = document.getElementById("status");
    const baseUrlLabel = document.getElementById("baseUrlLabel");
    const tbody = document.getElementById("courseTableBody");
    const basicTab = document.getElementById("basicTab");
    const guildTab = document.getElementById("guildTab");

    baseUrlLabel.textContent = BASE_URL;

    let currentMode = "basic";
    let selectedIndex = 0;

    function getDisplayCourse(course, mode) {
      if (mode === "guild") {
        return {
          id: course.id + "-G",
          name: course.name + " - Guild"
        };
      }
      return {
        id: course.id,
        name: course.name
      };
    }

    function renderTable() {
      tbody.innerHTML = "";

      courses.forEach((course, index) => {
        const displayCourse = getDisplayCourse(course, currentMode);

        const tr = document.createElement("tr");
        tr.dataset.id = displayCourse.id;
        tr.dataset.name = displayCourse.name;
        tr.dataset.index = index;

        tr.innerHTML = `
          <td><input type="radio" name="sel" aria-label="Select ${displayCourse.id}"></td>
          <td>${displayCourse.id}</td>
          <td>${escapeHtml(displayCourse.name)}</td>
        `;

        tr.addEventListener("click", () => {
          selectedIndex = index;
          setSelectedRow(tr);
        });

        tbody.appendChild(tr);
      });

      const rows = tbody.querySelectorAll("tr");
      if (rows.length) {
        setSelectedRow(rows[selectedIndex] || rows[0]);
      }
    }

    function setSelectedRow(tr) {
      [...tbody.querySelectorAll("tr")].forEach(r => r.classList.remove("selected"));
      tr.classList.add("selected");

      const radio = tr.querySelector('input[type="radio"]');
      if (radio) radio.checked = true;

      const id = tr.dataset.id || "";
      urlOut.value = BASE_URL + encodeURIComponent(id);

      statusEl.textContent = "";
    }

    function setMode(mode) {
      currentMode = mode;

      basicTab.classList.toggle("active", mode === "basic");
      guildTab.classList.toggle("active", mode === "guild");

      basicTab.setAttribute("aria-selected", mode === "basic" ? "true" : "false");
      guildTab.setAttribute("aria-selected", mode === "guild" ? "true" : "false");

      renderTable();
    }

    basicTab.addEventListener("click", () => setMode("basic"));
    guildTab.addEventListener("click", () => setMode("guild"));

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(urlOut.value);
        statusEl.textContent = "Copied!";
        setTimeout(() => statusEl.textContent = "", 1200);
      } catch {
        urlOut.focus();
        urlOut.select();
        statusEl.textContent = "Press Ctrl/Cmd+C to copy";
        setTimeout(() => statusEl.textContent = "", 2000);
      }
    });

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderTable();
  </script>
</body>
</html>
